services:
  postgres:
    image: postgres:16-alpine
    container_name: scanner_site_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner
      POSTGRES_DB: scanner
    ports:
      - "5433:5432"
    volumes:
      - scanner_site_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d scanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: scanner_site_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - scanner_site_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  scanner_site_pg:
  scanner_site_redis:
